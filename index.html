<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#08090A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StockAnalysis">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" content="AI-powered stock analysis dashboard — daily picks, ML metrics, performance tracking.">
    <title>StockAnalysis Dashboard</title>
    <!-- PWA manifest + iOS Add-to-Home-Screen -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%2308090A%22 rx=%2222%22/><polyline points=%2280 50 68 50 58 80 42 20 32 50 20 50%22 fill=%22none%22 stroke=%22%235E6AD2%22 stroke-width=%226%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22/></svg>">
    <!-- Preconnect to API + chart CDN + font CDN so DNS+TLS happen during HTML parse -->
    <link rel="preconnect" href="https://func-stockanalysis-oksq5n.azurewebsites.net" crossorigin>
    <link rel="preconnect" href="https://rsms.me" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <!-- Inter font (Linear-style typography) — non-blocking, system fallback acceptable -->
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://rsms.me/inter/inter.css"></noscript>
    <link rel="stylesheet" href="css/style.css?v=7.5">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%235E6AD2%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%2222 12 18 12 15 21 9 3 6 12 2 12%22/></svg>">
</head>
<body>
    <!-- Top navigation -->
    <nav class="nav" id="nav" style="display:none">
        <a href="#/daily" class="nav-brand">
            <svg class="nav-logo" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            <span class="nav-brand-text">StockAnalysis</span>
        </a>
        <div class="nav-links">
            <a href="#/daily">Daily</a>
            <a href="#/performance">Performance</a>
            <a href="#/pipeline" data-admin-only>Pipeline</a>
            <a href="#/budget" data-admin-only>Budget</a>
            <a href="#/system" data-admin-only>System</a>
            <a href="#/diagnostics" data-admin-only>Diagnostics</a>
            <a href="#/admin" data-super-admin-only>Admin</a>
        </div>
        <div class="nav-user">
            <select id="view-as-select" class="view-as-select" data-admin-only
                    title="Test the dashboard as a different user tier"
                    aria-label="View dashboard as tier">
                <option value="real">View as: Admin</option>
                <option value="free">View as: Free user</option>
                <option value="pro">View as: Pro user</option>
            </select>
            <span id="user-email"></span>
            <a href="#" class="logout" onclick="API.logout();window.location.hash='#/login';return false;">Logout</a>
        </div>
    </nav>

    <!-- Persistent legal disclaimer (authenticated pages only — toggled by app.js).
         Dismissible per browser session via sessionStorage; never per account. -->
    <div class="disclaimer-bar" id="disclaimer-bar" hidden role="note" aria-label="Legal disclaimer">
        <span class="disclaimer-text">
            <strong>Not financial advice.</strong> For informational purposes only.
            See <a href="legal/terms.html">Terms</a> and <a href="legal/privacy.html">Privacy</a>.
        </span>
        <button type="button" class="disclaimer-dismiss" id="disclaimer-dismiss"
                aria-label="Dismiss for this session">×</button>
    </div>

    <!-- App content (SPA) -->
    <div class="main" id="app">
        <div class="loading-overlay"><div class="spinner"></div> Loading...</div>
    </div>

    <!-- Footer with legal links — visible on every page so search engines + users
         can find the policies even from the public landing/login page. -->
    <footer class="site-footer" aria-label="Site footer">
        <div class="site-footer-inner">
            <span>© StockAnalysis</span>
            <span class="dot">·</span>
            <a href="legal/terms.html">Terms</a>
            <span class="dot">·</span>
            <a href="legal/privacy.html">Privacy</a>
            <span class="dot">·</span>
            <span class="muted">US &amp; Canada only</span>
        </div>
    </footer>

    <!-- Mobile bottom-nav (visibility gated by CSS: body.has-bottom-nav + @media <=768px) -->
    <nav class="bottom-nav" id="bottom-nav" aria-label="Primary navigation">
        <a href="#/daily"       data-route="/daily"       aria-label="Daily picks"><span class="icon" aria-hidden="true">📊</span><span>Daily</span></a>
        <a href="#/performance" data-route="/performance" aria-label="Performance"><span class="icon" aria-hidden="true">📈</span><span>Perf</span></a>
        <a href="#/pipeline"    data-route="/pipeline"    data-admin-only aria-label="Pipeline"><span class="icon" aria-hidden="true">🔀</span><span>Pipeline</span></a>
        <a href="#/budget"      data-route="/budget"      data-admin-only aria-label="Budget"><span class="icon" aria-hidden="true">💰</span><span>Budget</span></a>
        <a href="#/system"      data-route="/system"      data-admin-only aria-label="System status"><span class="icon" aria-hidden="true">⚙️</span><span>System</span></a>
        <a href="#/diagnostics" data-route="/diagnostics" data-admin-only aria-label="Diagnostics"><span class="icon" aria-hidden="true">🔬</span><span>Diag</span></a>
    </nav>

    <script src="js/api.js?v=7.5"></script>
    <script src="js/app.js?v=7.5"></script>
    <script>
        // PWA service worker — best-effort, fails silently on http://localhost
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
        // Cookie notice (Phase 13e — privacy/transparency).
        // Not a consent banner: we currently use ONLY essential auth cookies,
        // so consent isn't legally required. This is a one-time disclosure.
        (function () {
            try {
                if (localStorage.getItem('cookie_notice_dismissed_v1')) return;
                window.addEventListener('load', () => {
                    const div = document.createElement('div');
                    div.id = 'cookie-notice';
                    div.setAttribute('role', 'note');
                    div.style.cssText = 'position:fixed;bottom:16px;right:16px;max-width:340px;padding:12px 14px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-radius:8px;font-size:13px;line-height:1.5;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,0.3)';
                    div.innerHTML = 'We use a single session cookie to keep you signed in. No tracking, no ads. <a href="legal/privacy.html" style="color:#60a5fa;text-decoration:underline">Privacy</a> · <button id="cookie-notice-ok" style="margin-left:8px;background:#475569;color:white;border:0;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px">Got it</button>';
                    document.body.appendChild(div);
                    document.getElementById('cookie-notice-ok').addEventListener('click', () => {
                        localStorage.setItem('cookie_notice_dismissed_v1', '1');
                        div.remove();
                    });
                });
            } catch (_) { /* localStorage blocked — don't break the page */ }
        })();
    </script>
</body>
</html>
